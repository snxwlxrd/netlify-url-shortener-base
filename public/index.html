<!doctype html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tautan Pendek — Bulk URL Shortener</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #15101c;
    --surface: #1f1830;
    --surface-2: #261d3a;
    --border: #362a4d;
    --text: #f2ede4;
    --text-dim: #a99fb8;
    --accent: #f0b429;
    --accent-dim: #b5862a;
    --mint: #7fe7c4;
    --error: #ff6b6b;
  }

  * { box-sizing: border-box; }

  body{
    margin: 0;
    background: radial-gradient(circle at 20% -10%, #261b3a 0%, var(--bg) 55%);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    padding: 48px 20px 80px;
  }

  .wrap{
    max-width: 720px;
    margin: 0 auto;
  }

  .brand{
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 6px;
  }

  .brand svg{ flex-shrink: 0; }

  h1{
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(24px, 4vw, 32px);
    font-weight: 700;
    margin: 0;
    letter-spacing: -0.01em;
  }

  .tagline{
    color: var(--text-dim);
    font-size: 14.5px;
    margin: 0 0 36px;
    line-height: 1.6;
    max-width: 50ch;
  }

  .panel{
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }

  .editor{
    display: flex;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 14px;
    line-height: 24px;
  }

  .gutter{
    background: var(--surface-2);
    color: var(--text-dim);
    text-align: right;
    padding: 16px 10px;
    user-select: none;
    border-right: 1px solid var(--border);
    min-width: 38px;
    white-space: pre;
    overflow: hidden;
  }

  textarea{
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    resize: vertical;
    color: var(--text);
    padding: 16px;
    font-family: inherit;
    font-size: inherit;
    line-height: 24px;
    min-height: 200px;
  }

  textarea::placeholder{ color: #5e5474; }

  .panel-footer{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
  }

  .hint{
    font-size: 12.5px;
    color: var(--text-dim);
  }

  button{
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.12s ease, background 0.12s ease, opacity 0.12s ease;
  }

  button:focus-visible{
    outline: 2px solid var(--mint);
    outline-offset: 2px;
  }

  .btn-primary{
    background: var(--accent);
    color: #1a1308;
    padding: 10px 20px;
  }

  .btn-primary:hover:not(:disabled){ transform: translateY(-1px); }
  .btn-primary:disabled{ opacity: 0.55; cursor: progress; }

  .error-msg{
    color: var(--error);
    font-size: 13.5px;
    margin: 10px 2px 0;
    min-height: 18px;
  }

  .results{
    margin-top: 28px;
  }

  .results-head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .results-head h2{
    font-family: 'Space Grotesk', sans-serif;
    font-size: 16px;
    margin: 0;
    color: var(--text-dim);
    font-weight: 500;
  }

  .btn-ghost{
    background: transparent;
    color: var(--mint);
    border: 1px solid var(--border);
    padding: 7px 14px;
    font-size: 13px;
  }
  .btn-ghost:hover{ border-color: var(--mint); }

  .row{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
  }

  .row .long{
    flex: 1;
    min-width: 0;
    color: var(--text-dim);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .chain{ flex-shrink: 0; opacity: 0.7; }

  .row .short{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13.5px;
    color: var(--mint);
    text-decoration: none;
    flex-shrink: 0;
  }
  .row .short:hover{ text-decoration: underline; }

  .btn-copy{
    background: var(--surface-2);
    color: var(--text);
    padding: 6px 12px;
    font-size: 12.5px;
    flex-shrink: 0;
    border: 1px solid var(--border);
  }
  .btn-copy:hover{ border-color: var(--accent); }
  .btn-copy.copied{ color: var(--accent); border-color: var(--accent); }

  footer{
    margin-top: 48px;
    color: var(--text-dim);
    font-size: 12.5px;
    text-align: center;
  }

  @media (prefers-reduced-motion: reduce){
    *{ transition: none !important; }
  }

  @media (max-width: 480px){
    .row{ flex-wrap: wrap; }
    .row .long{ flex-basis: 100%; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
        <circle cx="13" cy="13" r="8" stroke="#f0b429" stroke-width="2.5"/>
        <circle cx="21" cy="21" r="8" stroke="#7fe7c4" stroke-width="2.5"/>
      </svg>
      <h1>Tautan Pendek</h1>
    </div>
    <p class="tagline">Tempel banyak URL sekaligus, satu per baris. Tiap baris dapat kode singkat sendiri yang langsung redirect ke tujuan — tanpa halaman perantara.</p>

    <div class="panel">
      <div class="editor">
        <div class="gutter" id="gutter">1</div>
        <textarea id="urls" placeholder="https://contoh.com/artikel-panjang-sekali&#10;https://contoh.com/produk/123&#10;contoh.com/halaman-lain" spellcheck="false"></textarea>
      </div>
      <div class="panel-footer">
        <span class="hint" id="lineCount">0 tautan siap dipendekkan</span>
        <button class="btn-primary" id="submitBtn">Pendekkan Semua</button>
      </div>
    </div>
    <p class="error-msg" id="errorMsg"></p>

    <div class="results" id="results" hidden>
      <div class="results-head">
        <h2 id="resultsTitle">Hasil</h2>
        <button class="btn-ghost" id="copyAllBtn">Salin semua</button>
      </div>
      <div id="rows"></div>
    </div>

    <footer>Dijalankan dengan Netlify Functions + Netlify Blobs. Tidak ada pelacakan, tidak ada database eksternal.</footer>
  </div>

<script>
  const textarea = document.getElementById('urls');
  const gutter = document.getElementById('gutter');
  const lineCount = document.getElementById('lineCount');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const resultsSection = document.getElementById('results');
  const resultsTitle = document.getElementById('resultsTitle');
  const rowsEl = document.getElementById('rows');
  const copyAllBtn = document.getElementById('copyAllBtn');

  function updateGutter(){
    const lines = textarea.value.split('\n');
    const numbers = lines.map((_, i) => i + 1).join('\n');
    gutter.textContent = numbers;
    const filled = lines.filter(l => l.trim()).length;
    lineCount.textContent = filled === 0
      ? '0 tautan siap dipendekkan'
      : `${filled} tautan siap dipendekkan`;
  }

  textarea.addEventListener('input', updateGutter);
  textarea.addEventListener('scroll', () => {
    gutter.scrollTop = textarea.scrollTop;
  });
  updateGutter();

  function renderResults(results){
    rowsEl.innerHTML = '';
    resultsTitle.textContent = `Hasil (${results.length})`;
    for (const { longUrl, shortUrl } of results){
      const row = document.createElement('div');
      row.className = 'row';
      row.innerHTML = `
        <span class="long" title="${longUrl}">${longUrl}</span>
        <svg class="chain" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6" cy="6" r="3.5" stroke="#a99fb8" stroke-width="1.6"/>
          <circle cx="10" cy="10" r="3.5" stroke="#a99fb8" stroke-width="1.6"/>
        </svg>
        <a class="short" href="${shortUrl}" target="_blank" rel="noopener">${shortUrl.replace(/^https?:\/\//,'')}</a>
        <button class="btn-copy">Salin</button>
      `;
      row.querySelector('.btn-copy').addEventListener('click', (e) => {
        navigator.clipboard.writeText(shortUrl);
        const btn = e.currentTarget;
        btn.textContent = 'Tersalin ✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Salin'; btn.classList.remove('copied'); }, 1500);
      });
      rowsEl.appendChild(row);
    }
    resultsSection.hidden = false;

    copyAllBtn.onclick = () => {
      navigator.clipboard.writeText(results.map(r => r.shortUrl).join('\n'));
      copyAllBtn.textContent = 'Tersalin ✓';
      setTimeout(() => { copyAllBtn.textContent = 'Salin semua'; }, 1500);
    };
  }

  submitBtn.addEventListener('click', async () => {
    errorMsg.textContent = '';
    const urls = textarea.value.split('\n').map(l => l.trim()).filter(Boolean);

    if (urls.length === 0){
      errorMsg.textContent = 'Isi minimal satu URL dulu, satu baris satu tautan.';
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = 'Memproses...';

    try {
      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ urls }),
      });
      const data = await res.json();

      if (!res.ok){
        errorMsg.textContent = data.error || 'Gagal memendekkan tautan.';
        return;
      }

      renderResults(data.results);
    } catch (err) {
      errorMsg.textContent = 'Tidak bisa menghubungi server. Coba lagi.';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Pendekkan Semua';
    }
  });
</script>
</body>
</html>
